# Master Chen 完整服务编排
# 包含：应用 + Redis + Qdrant + Langfuse

services:
  # ============ Python 应用 ============
  app:
    build: .
    container_name: master-chen-app
    ports:
      - "8000:8000"
    env_file:
      - .env
    depends_on:
      redis:
        condition: service_healthy
      qdrant:
        condition: service_started
    # 不映射文件到本地，避免互相干扰
    restart: unless-stopped

  # ============ Redis ============
  redis:
    image: docker.io/redis:7
    container_name: master-chen-redis
    # 不映射端口到本地，避免与本地 Redis 冲突
    # 应用容器通过 Docker 网络（redis://redis:6379）访问
    # 使用 Docker volume 持久化，不映射到本地
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # ============ Qdrant 向量数据库 ============
  qdrant:
    image: docker.io/qdrant/qdrant:latest
    container_name: master-chen-qdrant
    # 不映射端口到本地，避免与本地 Qdrant 冲突
    # 应用容器通过 Docker 网络（http://qdrant:6333）访问
    # 使用 Docker volume 持久化，不映射到本地
    volumes:
      - qdrant_data:/qdrant/storage
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:6333/healthz"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # ============ Langfuse 监控（可选）============
  # 取消注释以下行启用 Langfuse
  # langfuse-web:
  #   extends:
  #     file: ./langfuse/docker-compose.yml
  #     service: langfuse-web
  # langfuse-worker:
  #   extends:
  #     file: ./langfuse/docker-compose.yml
  #     service: langfuse-worker
  # clickhouse:
  #   extends:
  #     file: ./langfuse/docker-compose.yml
  #     service: clickhouse
  # minio:
  #   extends:
  #     file: ./langfuse/docker-compose.yml
  #     service: minio

volumes:
  redis_data:
  qdrant_data:
